<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AI Content — BAEK SEOKHYUN</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d1117;--bg2:#131923;--surface:#1a2233;--border:#1e2d42;--text:#e0e6f0;--muted:#5a7a99;--accent:#4a90d9;--accent2:#6ab0f5;--white:#ffffff;--nav-h:60px;--font-en:'Inter',sans-serif;--font-kr:'Noto Sans KR',sans-serif}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--font-kr);font-weight:300;-webkit-font-smoothing:antialiased}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 3rem;height:var(--nav-h);background:rgba(13,17,23,0.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .nav-logo{font-family:var(--font-en);font-size:0.95rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--white);text-decoration:none}
    .nav-links{display:flex;list-style:none}
    .nav-links>li{position:relative}
    .nav-links>li>a{display:flex;align-items:center;gap:0.3rem;padding:0 1.3rem;height:var(--nav-h);line-height:var(--nav-h);font-family:var(--font-en);font-size:0.78rem;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s;white-space:nowrap}
    .nav-links>li>a:hover,.nav-links>li>a.active{color:var(--white)}
    .nav-links>li>a.active::after{content:'';position:absolute;bottom:0;left:1.3rem;right:1.3rem;height:2px;background:var(--accent)}
    .chevron{display:inline-block;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:4px solid var(--muted);transition:transform 0.2s,border-top-color 0.2s;margin-top:1px}
    .nav-links>li:hover .chevron{transform:rotate(180deg);border-top-color:var(--white)}
    .dropdown{display:none;position:absolute;top:calc(var(--nav-h) - 1px);left:0;min-width:160px;background:rgba(19,25,35,0.97);border:1px solid var(--border);border-top:2px solid var(--accent);backdrop-filter:blur(16px);list-style:none}
    .nav-links>li:hover .dropdown{display:block}
    .dropdown li a{display:block;padding:0.7rem 1.4rem;font-family:var(--font-en);font-size:0.75rem;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.15s,background 0.15s}
    .dropdown li a:hover{color:var(--white);background:rgba(74,144,217,0.08)}

    .page-header{padding:calc(var(--nav-h) + 5rem) 3rem 3rem;max-width:1200px;margin:0 auto}
    .page-eyebrow{font-family:var(--font-en);font-size:0.7rem;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;color:var(--accent);margin-bottom:0.6rem}
    .page-title{font-family:var(--font-en);font-size:clamp(2rem,4vw,3.5rem);font-weight:800;color:var(--white);letter-spacing:-0.02em}

    .grid-wrap{max-width:1200px;margin:0 auto;padding:2rem 3rem 6rem}
    .work-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
    .work-card{position:relative;overflow:hidden;aspect-ratio:3/4;background:var(--surface);cursor:pointer}
    .work-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.5s cubic-bezier(.25,.46,.45,.94)}
    .work-card:hover img{transform:scale(1.04)}
    .work-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.65);opacity:0;transition:opacity 0.35s;display:flex;flex-direction:column;justify-content:flex-end;padding:1.75rem 1.5rem}
    .work-card:hover .work-overlay{opacity:1}
    .work-brand{font-family:var(--font-en);font-size:0.7rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent2);margin-bottom:0.4rem}
    .work-project{font-family:var(--font-en);font-size:1rem;font-weight:600;color:var(--white);margin-bottom:0.3rem;line-height:1.3}
    .work-date{font-family:var(--font-en);font-size:0.7rem;color:rgba(255,255,255,0.5);letter-spacing:0.1em}
    .work-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.6rem;color:var(--border);font-family:var(--font-en);font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase}

    .lightbox{display:none;position:fixed;inset:0;z-index:200;background:rgba(7,11,17,0.96);align-items:center;justify-content:center}
    .lightbox.open{display:flex}
    .lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;border:1px solid var(--border)}
    .lightbox-close{position:absolute;top:1.5rem;right:2rem;font-size:2rem;color:var(--muted);cursor:pointer;background:none;border:none;transition:color 0.2s;line-height:1}
    .lightbox-close:hover{color:var(--white)}

    footer{padding:2rem 3rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .footer-copy{font-family:var(--font-en);font-size:0.72rem;color:var(--muted);letter-spacing:0.06em}
    .footer-back{font-family:var(--font-en);font-size:0.72rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;transition:color 0.2s}
    .footer-back:hover{color:var(--accent2)}
    @media(max-width:900px){nav{padding:0 1.5rem}.page-header{padding:calc(var(--nav-h)+3rem) 1.5rem 2rem}.grid-wrap{padding:2rem 1.5rem 4rem}}
    @media(max-width:600px){.nav-links{display:none}.work-grid{grid-template-columns:repeat(2,1fr)}footer{flex-direction:column;gap:1rem;text-align:center}}
  </style>
</head>
<body>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">×</button>
  <img id="lightboxImg" src="" alt=""/>
</div>
<script>
  function openLightbox(card){const img=card.querySelector('img');if(!img)return;document.getElementById('lightboxImg').src=img.src;document.getElementById('lightbox').classList.add('open')}
  document.getElementById('lightboxClose').addEventListener('click',()=>document.getElementById('lightbox').classList.remove('open'));
  document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox'))document.getElementById('lightbox').classList.remove('open')});
</script>
