<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>BAEK SEOKHYUN — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;--bg2:#131923;--surface:#1a2233;--border:#1e2d42;
      --text:#e0e6f0;--muted:#5a7a99;--accent:#4a90d9;--accent2:#6ab0f5;
      --white:#ffffff;--nav-h:60px;
      --font-en:'Inter',sans-serif;--font-kr:'Noto Sans KR',sans-serif;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--font-kr);font-weight:300;-webkit-font-smoothing:antialiased}

    /* NAV */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 3rem;height:var(--nav-h);
      background:rgba(13,17,23,0.93);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
    }
    .nav-logo{font-family:var(--font-en);font-size:0.95rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--white);text-decoration:none}
    .nav-links{display:flex;list-style:none}
    .nav-links>li{position:relative}
    .nav-links>li>a{
      display:flex;align-items:center;gap:0.3rem;
      padding:0 1.3rem;height:var(--nav-h);line-height:var(--nav-h);
      font-family:var(--font-en);font-size:0.78rem;font-weight:400;
      letter-spacing:0.1em;text-transform:uppercase;
      color:var(--muted);text-decoration:none;transition:color 0.2s;white-space:nowrap;
    }
    .nav-links>li>a:hover,.nav-links>li>a.active{color:var(--white)}
    .nav-links>li>a.active::after{content:'';position:absolute;bottom:0;left:1.3rem;right:1.3rem;height:2px;background:var(--accent)}
    .chevron{display:inline-block;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:4px solid var(--muted);transition:transform 0.2s,border-top-color 0.2s;margin-top:1px}
    .nav-links>li:hover .chevron{transform:rotate(180deg);border-top-color:var(--white)}
    .dropdown{display:none;position:absolute;top:calc(var(--nav-h) - 1px);left:0;min-width:160px;background:rgba(19,25,35,0.97);border:1px solid var(--border);border-top:2px solid var(--accent);backdrop-filter:blur(16px);list-style:none}
    .nav-links>li:hover .dropdown{display:block}
    .dropdown li a{display:block;padding:0.7rem 1.4rem;font-family:var(--font-en);font-size:0.75rem;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.15s,background 0.15s}
    .dropdown li a:hover{color:var(--white);background:rgba(74,144,217,0.08)}

    /* HERO */
    #hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding-top:var(--nav-h);position:relative;overflow:hidden}
    #hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(74,144,217,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(74,144,217,0.03) 1px,transparent 1px);background-size:80px 80px;pointer-events:none}
    .hero-inner{max-width:1200px;margin:0 auto;padding:0 3rem;width:100%;display:flex;flex-direction:column;justify-content:center;height:calc(100vh - var(--nav-h))}
    .hero-eyebrow{font-family:var(--font-en);font-size:0.72rem;font-weight:400;letter-spacing:0.28em;text-transform:uppercase;color:var(--muted);margin-bottom:1.5rem}
    .hero-name{font-family:var(--font-en);font-size:clamp(3rem,7vw,6rem);font-weight:800;line-height:1.0;letter-spacing:-0.02em;color:var(--white);margin-bottom:1rem}
    .hero-tags{display:flex;align-items:center;gap:0.75rem;margin-bottom:2rem;flex-wrap:wrap}
    .hero-tag{font-family:var(--font-en);font-size:0.95rem;font-weight:300;color:var(--accent2);letter-spacing:0.02em}
    .hero-dot{width:4px;height:4px;background:var(--muted);border-radius:50%}
    .hero-divider{width:48px;height:2px;background:var(--accent);margin-bottom:2.5rem}
    .hero-year{position:absolute;bottom:2.5rem;left:3rem;font-family:var(--font-en);font-size:0.72rem;color:var(--muted);letter-spacing:0.1em}

    /* GRID SECTION */
    .grid-section{max-width:1200px;margin:0 auto;padding:4rem 3rem 6rem;width:100%}

    /* 3-col 3:4 grid */
    .work-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:4px;
    }
    .work-card{
      position:relative;overflow:hidden;
      aspect-ratio:3/4;
      background:var(--surface);
      cursor:pointer;
    }
    .work-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.5s cubic-bezier(.25,.46,.45,.94)}
    .work-card:hover img{transform:scale(1.04)}

    /* hover overlay */
    .work-overlay{
      position:absolute;inset:0;
      background:rgba(0,0,0,0.65);
      opacity:0;transition:opacity 0.35s;
      display:flex;flex-direction:column;justify-content:flex-end;
      padding:1.75rem 1.5rem;
    }
    .work-card:hover .work-overlay{opacity:1}
    .work-brand{font-family:var(--font-en);font-size:0.7rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent2);margin-bottom:0.4rem}
    .work-project{font-family:var(--font-en);font-size:1rem;font-weight:600;color:var(--white);margin-bottom:0.3rem;line-height:1.3}
    .work-date{font-family:var(--font-en);font-size:0.7rem;font-weight:400;letter-spacing:0.1em;color:rgba(255,255,255,0.5)}

    /* placeholder */
    .work-placeholder{
      width:100%;height:100%;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.6rem;
      color:var(--border);font-family:var(--font-en);font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;
    }

    /* LIGHTBOX */
    .lightbox{display:none;position:fixed;inset:0;z-index:200;background:rgba(7,11,17,0.96);align-items:center;justify-content:center}
    .lightbox.open{display:flex}
    .lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;border:1px solid var(--border)}
    .lightbox-close{position:absolute;top:1.5rem;right:2rem;font-size:2rem;color:var(--muted);cursor:pointer;background:none;border:none;transition:color 0.2s;line-height:1}
    .lightbox-close:hover{color:var(--white)}

    /* FOOTER */
    footer{padding:2rem 3rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .footer-copy{font-family:var(--font-en);font-size:0.72rem;color:var(--muted);letter-spacing:0.06em}
    .footer-back{font-family:var(--font-en);font-size:0.72rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;transition:color 0.2s}
    .footer-back:hover{color:var(--accent2)}

    /* Show more 버튼 */
    .show-more-wrap{display:flex;justify-content:center;margin-top:2.5rem}
    .show-more-btn{
      display:inline-flex;align-items:center;gap:0.5rem;
      padding:0.9rem 2.2rem;
      border:1px solid var(--border);
      font-family:var(--font-en);font-size:0.78rem;font-weight:500;
      letter-spacing:0.14em;text-transform:uppercase;
      color:var(--muted);text-decoration:none;
      transition:color 0.2s,border-color 0.2s,background 0.2s;
    }
    .show-more-btn:hover{color:var(--white);border-color:var(--accent);background:rgba(74,144,217,0.06)}
    .show-more-btn svg{transition:transform 0.2s}
    .show-more-btn:hover svg{transform:translateY(2px)}

    /* 홈 그리드 placeholder(빈 상태) */
    .work-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.6rem;color:var(--border);font-family:var(--font-en);font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase}

    @media(max-width:900px){nav{padding:0 1.5rem}.hero-inner{padding:0 1.5rem}.grid-section{padding:3rem 1.5rem 4rem}.hero-year{left:1.5rem}}
    @media(max-width:600px){.nav-links{display:none}.work-grid{grid-template-columns:repeat(2,1fr)}footer{flex-direction:column;gap:1rem;text-align:center}}
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Baek Seokhyun</a>
  <ul class="nav-links">
    <li><a href="index.html" class="active">Home</a></li>
    <li>
      <a href="photography.html">Photography <span class="chevron"></span></a>
      <ul class="dropdown">
        <li><a href="photography.html?filter=food">Food</a></li>
        <li><a href="photography.html?filter=product">Product</a></li>
      </ul>
    </li>
    <li><a href="video.html">Video</a></li>
    <li>
      <a href="ai.html">AI Content <span class="chevron"></span></a>
      <ul class="dropdown">
        <li><a href="ai.html?filter=photography">Photography</a></li>
        <li><a href="ai.html?filter=video">Video</a></li>
      </ul>
    </li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-inner">
    <p class="hero-eyebrow">Portfolio</p>
    <h1 class="hero-name">BAEK<br>SEOKHYUN</h1>
    <div class="hero-tags">
      <span class="hero-tag">Photography</span>
      <span class="hero-dot"></span>
      <span class="hero-tag">Video</span>
      <span class="hero-dot"></span>
      <span class="hero-tag">AI Content</span>
    </div>
    <div class="hero-divider"></div>
  </div>
  <p class="hero-year">2026</p>
</section>

<!-- ALL WORKS GRID -->
<div class="grid-section">
  <div class="work-grid" id="workGrid">
    <!-- JS로 자동 생성됨 (HOME_WORKS 데이터 기반) -->
  </div>
  <div class="show-more-wrap" id="showMoreWrap" style="display:none">
    <a class="show-more-btn" href="photography.html">
      Show more
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </a>
  </div>
</div>

<footer>
  <p class="footer-copy">© 2026 Baek Seokhyun. All rights reserved.</p>
  <a class="footer-back" href="#hero">Back to top ↑</a>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">×</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<script>
  // ──────────────────────────────────────────────────────────────
  // 홈에 보여줄 사진 콘텐츠 (Photography + AI Photography)
  // 새 작업 추가 시 이 배열 맨 위에 추가하면 됩니다.
  //   type: 'photo' → project.html로 이동
  //   type: 'ai'    → ai-project.html로 이동
  // ──────────────────────────────────────────────────────────────
  const HOME_WORKS = [
    {
      type:    "ai",            // ai-project.html?id=... 로 연결
      id:      "lelabo-workspec",
      img:     "https://res.cloudinary.com/cfljj4qd/image/upload/w_800/v1782874332/%E1%84%85%E1%85%B3%E1%84%85%E1%85%A1%E1%84%87%E1%85%A9_%E1%84%83%E1%85%A1%E1%86%AB%E1%84%8E%E1%85%A6_01_opqajw.jpg",
      brand:   "Le Labo",
      project: "Work Spec",
      date:    "2026",
    },
    // 여기에 새 작업 추가:
    // { type:"photo", id:"프로젝트id", img:"URL", brand:"브랜드", project:"프로젝트명", date:"2025" },
  ];

  const LIMIT = 10; // 홈에 최대로 보여줄 개수
  const grid = document.getElementById('workGrid');
  const showMoreWrap = document.getElementById('showMoreWrap');

  if (HOME_WORKS.length === 0) {
    // 작업물이 없을 때 placeholder 표시
    grid.innerHTML = Array(6).fill('<div class="work-card"><div class="work-placeholder"><svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>이미지 추가</div></div>').join('');
  } else {
    const visible = HOME_WORKS.slice(0, LIMIT);
    grid.innerHTML = visible.map(w => {
      const link = w.type === 'ai' ? `ai-project.html?id=${w.id}` : `project.html?id=${w.id}`;
      return `
        <div class="work-card" onclick="location.href='${link}'">
          <img src="${w.img}" alt="${w.project}" loading="lazy"/>
          <div class="work-overlay">
            <p class="work-brand">${w.brand}</p>
            <p class="work-project">${w.project}</p>
            <p class="work-date">${w.date}</p>
          </div>
        </div>`;
    }).join('');

    // 10개를 초과하면 Show more 노출
    if (HOME_WORKS.length > LIMIT) {
      showMoreWrap.style.display = 'flex';
    }
  }

  // 라이트박스 (현재는 상세페이지로 이동하므로 미사용, 호환 위해 유지)
  function openLightbox(card){
    const img=card.querySelector('img');
    if(!img)return;
    document.getElementById('lightboxImg').src=img.src;
    document.getElementById('lightbox').classList.add('open');
  }
  document.getElementById('lightboxClose').addEventListener('click',()=>document.getElementById('lightbox').classList.remove('open'));
  document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox'))document.getElementById('lightbox').classList.remove('open')});
</script>
</body>
</html>
